name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      semgrep_config:
        description: "Space-separated Semgrep rule packs to run."
        type: string
        default: "p/security-audit p/secrets p/github-actions p/javascript p/php p/python"
      fail_on_findings:
        description: "Fail the job when issues are found."
        type: boolean
        default: true
      zizmor_min_severity:
        description: "Minimum zizmor severity (informational|low|medium|high)."
        type: string
        default: "low"

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Semgrep
        env:
          SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
          FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
          SEMGREP_SEND_METRICS: "off"
        run: |
          set -euo pipefail
          python3 -m pip install --user --quiet semgrep==1.167.0
          export PATH="$HOME/.local/bin:$PATH"
          args=(scan --metrics=off --disable-version-check --sarif --output semgrep.sarif)
          # shellcheck disable=SC2086
          for pack in $SEMGREP_CONFIG; do
            args+=(--config "$pack")
          done
          if [ "$FAIL_ON_FINDINGS" = "true" ]; then
            args+=(--error)
          fi
          semgrep "${args[@]}"
      - name: Upload Semgrep SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14
          if-no-files-found: ignore

  actions-audit:
    name: Actions Security (zizmor + actionlint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: actionlint
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 # 1.7.12
        with:
          args: -color
      - name: Run zizmor
        env:
          ZIZMOR_MIN_SEVERITY: ${{ inputs.zizmor_min_severity }}
          FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 -m pip install --user --quiet zizmor==1.26.1
          export PATH="$HOME/.local/bin:$PATH"
          config_arg=""
          if [ -f .github/zizmor.yml ]; then
            config_arg="--config .github/zizmor.yml"
          fi
          # shellcheck disable=SC2086
          if [ "$FAIL_ON_FINDINGS" = "true" ]; then
            zizmor $config_arg --min-severity "$ZIZMOR_MIN_SEVERITY" .github/workflows
          else
            zizmor $config_arg --min-severity "$ZIZMOR_MIN_SEVERITY" .github/workflows || true
          fi
