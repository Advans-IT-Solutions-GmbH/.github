name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      semgrep_config:
        description: "Space-separated Semgrep rule packs to run."
        type: string
        default: "p/security-audit p/secrets p/github-actions p/javascript p/php p/python"
      fail_on_findings:
        description: "Fail the job when issues are found."
        type: boolean
        default: true
      zizmor_min_severity:
        description: "Minimum zizmor severity (informational|low|medium|high)."
        type: string
        default: "low"
      gitleaks_fail:
        description: "Fail the job when gitleaks finds secrets. Default false = report-only (Phase 1)."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Semgrep
        env:
          SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
          FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
          SEMGREP_SEND_METRICS: "off"
        run: |
          set -euo pipefail
          python3 -m pip install --user --quiet semgrep==1.167.0
          export PATH="$HOME/.local/bin:$PATH"
          args=(scan --metrics=off --disable-version-check --sarif --output semgrep.sarif)
          # shellcheck disable=SC2086
          for pack in $SEMGREP_CONFIG; do
            args+=(--config "$pack")
          done
          if [ "$FAIL_ON_FINDINGS" = "true" ]; then
            args+=(--error)
          fi
          semgrep "${args[@]}"
      - name: Upload Semgrep SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14
          if-no-files-found: ignore

  actions-audit:
    name: Actions Security (zizmor + actionlint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          set +e
          ./actionlint -color -shellcheck="shellcheck -S error"
          rc=$?
          set -e
          if [ "$FAIL_ON_FINDINGS" = "true" ]; then
            exit "$rc"
          fi
          # Report-only: tolerate findings (exit code 1) but fail on real errors (>1).
          if [ "$rc" -gt 1 ]; then
            echo "actionlint failed with unexpected exit code $rc"
            exit "$rc"
          fi
      - name: Run zizmor
        env:
          ZIZMOR_MIN_SEVERITY: ${{ inputs.zizmor_min_severity }}
          FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 -m pip install --user --quiet zizmor==1.26.1
          export PATH="$HOME/.local/bin:$PATH"
          config_arg=""
          if [ -f .github/zizmor.yml ]; then
            config_arg="--config .github/zizmor.yml"
          fi
          # shellcheck disable=SC2086
          if [ "$FAIL_ON_FINDINGS" = "true" ]; then
            zizmor $config_arg --min-severity "$ZIZMOR_MIN_SEVERITY" .github/workflows
          else
            zizmor $config_arg --min-severity "$ZIZMOR_MIN_SEVERITY" .github/workflows || true
          fi

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          GITLEAKS_FAIL: ${{ inputs.gitleaks_fail }}
          # Zentrale Baseline-Allowlist: bekanntes History-Rauschen (generierte Test-Logs,
          # Test-Fixtures). Zentral gepflegt — GITLEAKS_CONFIG_TOML hat Vorrang vor einer
          # repo-lokalen .gitleaks.toml, Anpassungen also hier vornehmen. Markdown/Doku wird
          # bewusst NICHT pauschal allowlisted (würde echte Secrets in READMEs/Changelogs verstecken).
          GITLEAKS_CONFIG_TOML: |
            [extend]
            useDefault = true

            [[allowlists]]
            description = "Committete Test-Logs und Test-Fixtures (generiertes/Dummy-Material)"
            paths = [
              '(^|/)tests/logs/',
              '(^|/)tests/scripts/',
            ]
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          # Phase 1 = report-only: gitleaks_fail=false -> --exit-code 0 (findet + meldet, bricht nicht ab).
          # Scharfschalten pro Repo: im aufrufenden security.yml `gitleaks_fail: true` setzen.
          if [ "$GITLEAKS_FAIL" = "true" ]; then EC=1; else EC=0; fi
          ./gitleaks git . --report-format sarif --report-path gitleaks.sarif \
            --redact --no-banner --exit-code "$EC"
      - name: Upload gitleaks SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          retention-days: 14
          if-no-files-found: ignore